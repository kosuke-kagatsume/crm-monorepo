<!DOCTYPE html>
<html>
<head>
    <title>Role Switch Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .role-buttons { margin: 20px 0; }
        .role-buttons button { margin: 5px; padding: 10px; }
        .current-role { font-weight: bold; color: blue; }
        .test-results { margin-top: 20px; }
        .masked { color: red; }
        .visible { color: green; }
    </style>
</head>
<body>
    <h1>Role-based Permission Masking Test</h1>
    
    <p>Current Role: <span id="currentRole" class="current-role">mgmt</span></p>
    
    <div class="role-buttons">
        <button onclick="switchRole('mgmt')">Management</button>
        <button onclick="switchRole('sales')">Sales</button>
        <button onclick="switchRole('clerk')">Clerk</button>
        <button onclick="switchRole('aftercare')">Aftercare</button>
    </div>

    <div class="test-results">
        <h3>KPI Masking Test</h3>
        <div id="kpiResults"></div>
        
        <h3>RAG Response Test</h3>
        <button onclick="testRAG()">Test RAG Query</button>
        <div id="ragResults"></div>
    </div>

    <script>
        let currentRole = 'mgmt';

        function switchRole(role) {
            currentRole = role;
            localStorage.setItem('role', role);
            document.getElementById('currentRole').textContent = role;
            updateKPITest();
            
            // Redirect to home page to see actual role switching
            if (confirm(`Switch to ${role} role and view dashboard?`)) {
                window.location.href = '/home';
            }
        }

        function updateKPITest() {
            const permissions = {
                mgmt: { canViewCost: true, canViewGrossMargin: true },
                branch: { canViewCost: true, canViewGrossMargin: true },
                sales: { canViewCost: false, canViewGrossMargin: false },
                clerk: { canViewCost: false, canViewGrossMargin: false },
                aftercare: { canViewCost: false, canViewGrossMargin: false }
            };

            const testValues = {
                grossMargin: '34.5%',
                cost: '¥150,000',
                cpa: '¥3,500'
            };

            const perm = permissions[currentRole];
            let html = '';
            
            html += `<p>Gross Margin (粗利率): <span class="${perm.canViewGrossMargin ? 'visible' : 'masked'}">${perm.canViewGrossMargin ? testValues.grossMargin : '—'}</span></p>`;
            html += `<p>Cost (原価): <span class="${perm.canViewCost ? 'visible' : 'masked'}">${perm.canViewCost ? testValues.cost : '—'}</span></p>`;
            html += `<p>CPA: <span class="${perm.canViewCost ? 'visible' : 'masked'}">${perm.canViewCost ? testValues.cpa : '—'}</span></p>`;
            
            document.getElementById('kpiResults').innerHTML = html;
        }

        async function testRAG() {
            try {
                const response = await fetch('/api/rag', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: '粗利率と原価について教えて',
                        role: currentRole
                    })
                });

                const data = await response.json();
                
                let html = `<h4>RAG Response for ${currentRole}:</h4>`;
                html += `<p><strong>Answer:</strong> ${data.answer}</p>`;
                html += `<p><strong>Redactions Applied:</strong> ${data.redactionsApplied ? 'Yes' : 'No'}</p>`;
                if (data.redactedPatterns && data.redactedPatterns.length > 0) {
                    html += `<p><strong>Redacted Patterns:</strong> ${data.redactedPatterns.join(', ')}</p>`;
                }
                
                document.getElementById('ragResults').innerHTML = html;
            } catch (error) {
                document.getElementById('ragResults').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        // Initialize
        updateKPITest();
    </script>
</body>
</html>
